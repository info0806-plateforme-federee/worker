services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    init: true
    group_add:
      - ${DOCKER_GID:-981}
    environment:
      GRPC__SCHEDULER_URL: ${SCHEDULER_GRPC_URL:-scheduler:50051}
      NATS__URL: ${NATS_URL:-nats://nats:4222}
      WORKER__ID: ${WORKER_ID:-}
      WORKER__TAGS: ${WORKER_TAGS:-["cpu","docker"]}
      WORKER__TOTAL_CPU: ${WORKER_CPU:-4}
      WORKER__TOTAL_MEM_MB: ${WORKER_MEM_MB:-8192}
      WORKER__TOTAL_GPU: ${WORKER_GPU:-0}
      WORKER__MAX_SLOTS: ${WORKER_MAX_SLOTS:-2}
      TIMING__HEARTBEAT_INTERVAL_S: ${HEARTBEAT_INTERVAL_S:-5}
      TIMING__PULL_INTERVAL_S: ${PULL_INTERVAL_S:-3}
    env_file:
      - path: .env
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
      - ../runtime/artifacts:/artifacts
    network_mode: service:tailscale
    depends_on:
      - tailscale
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-worker}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

volumes:
  tailscale_state:
